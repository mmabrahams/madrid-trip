<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrid 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- User Selection Screen -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="login-hero"></div>
            <div class="login-card">
                <div class="login-header">
                    <p class="login-eyebrow">&#9728;&#65039; MADRID 2026</p>
                    <h1>Just like<br>that</h1>
                    <p data-i18n="login_dates" class="login-dates">1 - 4 april</p>
                </div>
                <h2 data-i18n="login_title">Wie ben jij?</h2>
            <div class="user-buttons">
                <button class="user-btn" data-user="Edje" style="--user-color: #C4613A">Edje</button>
                <button class="user-btn" data-user="Maxime" style="--user-color: #3A8F85">Maxime</button>
                <button class="user-btn" data-user="El Sierd" style="--user-color: #C69C4E">El Sierd</button>
                <button class="user-btn" data-user="Miqi" style="--user-color: #6B5BAD">Miqi</button>
                <button class="user-btn" data-user="Koen" style="--user-color: #D08B4A">Koen</button>
                <button class="user-btn" data-user="Bart" style="--user-color: #4A90A4">Bart</button>
            </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app-screen" class="screen">
        <!-- Header -->
        <header>
            <div class="header-left">
                <span class="flag-small">&#127466;&#127480;</span>
                <h1>Madrid 2026</h1>
            </div>
            <div class="header-right">
                <span id="current-user-badge" class="user-badge"></span>
                <button id="logout-btn" class="icon-btn" data-i18n-title="logout_title" title="Wissel van gebruiker">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <!-- Tab Navigation -->
        <nav class="tabs">
            <button class="tab active" data-tab="suggestions">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                <span data-i18n="tab_suggestions">Suggesties</span>
            </button>
            <button class="tab" data-tab="day-1">
                <span class="tab-date">1 apr</span>
                <span data-i18n="tab_day1">Dag 1</span>
            </button>
            <button class="tab" data-tab="day-2">
                <span class="tab-date">2 apr</span>
                <span data-i18n="tab_day2">Dag 2</span>
            </button>
            <button class="tab" data-tab="day-3">
                <span class="tab-date">3 apr</span>
                <span data-i18n="tab_day3">Dag 3</span>
            </button>
            <button class="tab" data-tab="day-4">
                <span class="tab-date">4 apr</span>
                <span data-i18n="tab_day4">Dag 4</span>
            </button>
        </nav>

        <!-- Suggestions Tab -->
        <div id="tab-suggestions" class="tab-content active">
            <div class="section-header">
                <h2 data-i18n="all_suggestions">Alle suggesties</h2>
                <button id="add-suggestion-btn" class="btn btn-primary" data-i18n="new_suggestion">+ Nieuwe suggestie</button>
            </div>

            <!-- Legend -->
            <div class="legend">
                <span class="legend-item" style="--dot-color: #C4613A">Edje</span>
                <span class="legend-item" style="--dot-color: #3A8F85">Maxime</span>
                <span class="legend-item" style="--dot-color: #C69C4E">El Sierd</span>
                <span class="legend-item" style="--dot-color: #6B5BAD">Miqi</span>
                <span class="legend-item" style="--dot-color: #D08B4A">Koen</span>
                <span class="legend-item" style="--dot-color: #4A90A4">Bart</span>
            </div>

            <div id="suggestions-list" class="suggestions-grid">
                <!-- Filled dynamically -->
            </div>
            <div id="no-suggestions" class="empty-state" style="display:none">
                <p data-i18n="no_suggestions">Nog geen suggesties. Voeg er een toe!</p>
            </div>
        </div>

        <!-- Day Tabs -->
        <div id="tab-day-1" class="tab-content day-tab" data-day="2026-04-01"></div>
        <div id="tab-day-2" class="tab-content day-tab" data-day="2026-04-02"></div>
        <div id="tab-day-3" class="tab-content day-tab" data-day="2026-04-03"></div>
        <div id="tab-day-4" class="tab-content day-tab" data-day="2026-04-04"></div>
    </div>

    <!-- Add Suggestion Modal -->
    <div id="suggestion-modal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h2 data-i18n="new_suggestion_title">Nieuwe suggestie</h2>
            <form id="suggestion-form">
                <div class="form-group">
                    <label for="s-title" data-i18n="label_activity">Activiteit</label>
                    <input type="text" id="s-title" data-i18n-placeholder="placeholder_activity" placeholder="Bijv. Museo del Prado bezoeken" required>
                </div>
                <div class="form-group">
                    <label for="s-location" data-i18n="label_location">Locatie</label>
                    <input type="text" id="s-location" data-i18n-placeholder="placeholder_location" placeholder="Bijv. Calle de Ruiz de Alarcon, 23" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="s-duration" data-i18n="label_duration">Duur</label>
                        <input type="text" id="s-duration" data-i18n-placeholder="placeholder_duration" placeholder="Bijv. 2 uur" required>
                    </div>
                    <div class="form-group">
                        <label for="s-daypart" data-i18n="label_daypart">Dagdeel</label>
                        <select id="s-daypart" required>
                            <option value="" data-i18n="option_choose">Kies...</option>
                            <option value="Ochtend" data-i18n="option_morning">Ochtend</option>
                            <option value="Middag" data-i18n="option_afternoon">Middag</option>
                            <option value="Avond" data-i18n="option_evening">Avond</option>
                            <option value="Hele dag" data-i18n="option_allday">Hele dag</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="s-cost" data-i18n="label_cost">Kosten (per persoon)</label>
                    <input type="text" id="s-cost" data-i18n-placeholder="placeholder_cost" placeholder="Bijv. &euro;15 of Gratis" required>
                </div>
                <div class="form-group">
                    <label for="s-link" data-i18n="label_link">Link <span class="label-optional" data-i18n="label_optional">(optioneel)</span></label>
                    <input type="url" id="s-link" data-i18n-placeholder="placeholder_link" placeholder="Bijv. https://www.museodelprado.es">
                </div>
                <div class="form-group">
                    <label for="s-description" data-i18n="label_description">Beschrijving <span class="label-optional" data-i18n="label_optional">(optioneel)</span></label>
                    <textarea id="s-description" rows="3" data-i18n-placeholder="placeholder_description" placeholder="Vertel iets meer over deze activiteit..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-suggestion" data-i18n="btn_cancel">Annuleer</button>
                    <button type="submit" class="btn btn-primary" data-i18n="btn_add">Toevoegen</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add to Day Modal -->
    <div id="day-add-modal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h2 data-i18n="add_to_day_title">Suggestie toevoegen aan dag</h2>
            <div id="day-add-list" class="day-add-suggestions">
                <!-- Filled dynamically -->
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" id="cancel-day-add" data-i18n="btn_close">Sluiten</button>
            </div>
        </div>
    </div>

    <!-- Agenda Detail Modal -->
    <div id="detail-modal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content modal-content-detail">
            <div id="detail-body">
                <!-- Filled dynamically -->
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" id="close-detail" data-i18n="btn_close">Sluiten</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
